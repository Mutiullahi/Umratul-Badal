<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Profile - Umratul Badal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dash.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="../Images/logo.png" alt="Logo"></div>
                <h3>UMRATUL BADAL</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="user_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
                <li class="active"><a href="user_profile.html"><i class="fas fa-user"></i> Profile Management</a></li>
                <li><a href="user_history.html"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="user_messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
                <li><a href="user_donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a></li>
                <li><a href="user_settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                <li style="margin-top: 50px;"><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div id="content">
            <nav class="top-navbar">
                <div class="nav-toggle" id="sidebarCollapse"><i class="fas fa-bars"></i></div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Ahmed+Khan&background=006838&color=fff" alt="User">
                        <div class="user-info"><span class="user-name">Ahmed Khan</span><span class="user-role">User</span></div>
                    </div>
                </div>
            </nav>
            <div class="main-content">
                <div class="page-title"><h2>Manage Profile</h2></div>
                <div class="card" style="max-width: 800px;">
                    <form>
                        <div style="display: flex; align-items: center; margin-bottom: 30px; gap: 20px;">
                            <img src="https://ui-avatars.com/api/?name=Ahmed+Khan&background=006838&color=fff" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--luxury-gold);">
                            <button type="button" class="btn btn-outline">Change Photo</button>
                        </div>
                        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group"><label>First Name</label><input type="text" class="form-control" value="Ahmed"></div>
                            <div class="form-group"><label>Last Name</label><input type="text" class="form-control" value="Khan"></div>
                            <div class="form-group"><label>Email Address</label><input type="email" class="form-control" value="ahmed@example.com"></div>
                            <div class="form-group"><label>Phone Number</label><input type="text" class="form-control" value="+1 234 567 890"></div>
                        </div>
                        <div class="form-group"><label>Address</label><textarea class="form-control" rows="2">123 Street, City, Country</textarea></div>
                        <div style="text-align: right; margin-top: 20px;"><button type="submit" class="btn btn-primary">Update Profile</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../JS/dash.js"></script>
</body>
</html>
