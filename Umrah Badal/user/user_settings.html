<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - Umratul Badal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dash.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="../Images/logo.png" alt="Logo"></div>
                <h3>UMRATUL BADAL</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="user_dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
                <li><a href="user_profile.html"><i class="fas fa-user"></i> Profile Management</a></li>
                <li><a href="user_history.html"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="user_messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
                <li><a href="user_donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a></li>
                <li class="active"><a href="user_settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                <li style="margin-top: 50px;"><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div id="content">
            <nav class="top-navbar">
                <div class="nav-toggle" id="sidebarCollapse"><i class="fas fa-bars"></i></div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Ahmed+Khan&background=006838&color=fff" alt="User">
                        <div class="user-info"><span class="user-name">Ahmed Khan</span><span class="user-role">User</span></div>
                    </div>
                </div>
            </nav>
            <div class="main-content">
                <div class="page-title"><h2>Account Settings</h2></div>
                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="card">
                        <h4 style="margin-bottom: 20px; color: var(--primary-green);">Security</h4>
                        <div class="form-group"><label>Current Password</label><input type="password" class="form-control"></div>
                        <div class="form-group"><label>New Password</label><input type="password" class="form-control"></div>
                        <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-control"></div>
                        <button class="btn btn-primary">Update Password</button>
                    </div>
                    <div class="card">
                        <h4 style="margin-bottom: 20px; color: var(--primary-green);">Preferences</h4>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" checked> <label style="margin-bottom: 0;">Email Notifications</label>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" checked> <label style="margin-bottom: 0;">WhatsApp Updates</label>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox"> <label style="margin-bottom: 0;">Two-Factor Authentication</label>
                        </div>
                        <div class="form-group"><label>Preferred Language</label><select class="form-control"><option>English</option><option>Arabic</option><option>Malay</option></select></div>
                        <button class="btn btn-primary">Save Preferences</button>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px; border-top: 4px solid #dc3545;">
                    <h4 style="color: #dc3545;">Danger Zone</h4>
                    <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Once you delete your account, there is no going back. Please be certain.</p>
                    <button class="btn" style="background-color: #dc3545; color: white;">Delete Account</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../JS/dash.js"></script>
</body>
</html>
