<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Setup - Umratul Badal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dash.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="../Images/logo.png" alt="Logo"></div>
                <h3>UMRATUL BADAL</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="admin_dashboard.html"><i class="fas fa-user-shield"></i> System Admin</a></li>
                <li><a href="admin_payment_gateway.html"><i class="fas fa-credit-card"></i> Payment Gateway</a></li>
                <li><a href="admin_payment_dashboard.html"><i class="fas fa-wallet"></i> Payment Dashboard</a></li>
                <li><a href="admin_requests.html"><i class="fas fa-tasks"></i> Manage Requests</a></li>
                <li><a href="manage_users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li ><a href="manage_managers.html"><i class="fas fa-user-tie"></i> Manage Managers</a></li>
                <li><a href="service_categories.html"><i class="fas fa-layer-group"></i> Service Categories</a></li>
                <li><a href="system_settings.html"><i class="fas fa-cogs"></i> System Settings</a></li>
                <li style="margin-top: 40px;"><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div id="content">
            <nav class="top-navbar">
                <div class="nav-toggle" id="sidebarCollapse"><i class="fas fa-bars"></i></div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=D4AF37&color=fff" alt="Admin">
                        <div class="user-info"><span class="user-name">Super Admin</span><span class="user-role">System Controller</span></div>
                    </div>
                </div>
            </nav>
            <div class="main-content">
                <div class="page-title"><h2>Payment Gateway Configuration</h2></div>
                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                            <i class="fab fa-paypal" style="font-size: 30px; color: #003087;"></i>
                            <h4>PayPal Integration</h4>
                        </div>
                        <div class="form-group"><label>Client ID</label><input type="text" class="form-control" placeholder="Enter PayPal Client ID"></div>
                        <div class="form-group"><label>Secret Key</label><input type="password" class="form-control" placeholder="Enter PayPal Secret Key"></div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox"> <label style="margin-bottom: 0;">Enable Sandbox Mode</label>
                        </div>
                        <button class="btn btn-primary">Save PayPal Config</button>
                    </div>
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                            <i class="fas fa-bolt" style="font-size: 30px; color: #fb923c;"></i>
                            <h4>Flutterwave Integration</h4>
                        </div>
                        <div class="form-group"><label>Public Key</label><input type="text" class="form-control" placeholder="Enter Public Key"></div>
                        <div class="form-group"><label>Secret Key</label><input type="password" class="form-control" placeholder="Enter Secret Key"></div>
                        <div class="form-group"><label>Encryption Key</label><input type="password" class="form-control" placeholder="Enter Encryption Key"></div>
                        <button class="btn btn-primary">Save Flutterwave Config</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../JS/dash.js"></script>
</body>
</html>
