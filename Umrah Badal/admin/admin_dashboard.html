<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard - Umratul Badal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dash.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="../Images/logo.png" alt="Logo"></div>
                <h3>UMRATUL BADAL</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="admin_dashboard.html"><i class="fas fa-user-shield"></i> System Admin</a></li>
                <li><a href="admin_payment_gateway.html"><i class="fas fa-credit-card"></i> Payment Gateway</a></li>
                <li><a href="admin_payment_dashboard.html"><i class="fas fa-wallet"></i> Payment Dashboard</a></li>
                <li><a href="admin_requests.html"><i class="fas fa-tasks"></i> Manage Requests</a></li>
                <li><a href="manage_users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li ><a href="manage_managers.html"><i class="fas fa-user-tie"></i> Manage Managers</a></li>
                <li><a href="service_categories.html"><i class="fas fa-layer-group"></i> Service Categories</a></li>
                <li><a href="system_settings.html"><i class="fas fa-cogs"></i> System Settings</a></li>
                <li style="margin-top: 40px;"><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div id="content">
            <nav class="top-navbar">
                <div class="nav-toggle" id="sidebarCollapse"><i class="fas fa-bars"></i></div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=D4AF37&color=fff" alt="Admin">
                        <div class="user-info"><span class="user-name">Super Admin</span><span class="user-role">System Controller</span></div>
                    </div>
                </div>
            </nav>
            <div class="main-content">
                <div class="page-title"><h2>Super Admin Overview</h2></div>
                <div class="stats-grid">
                    <div class="card stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-details"><h4>Total Users</h4><div class="stat-value">1,240</div></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon"><i class="fas fa-hand-holding-usd"></i></div>
                        <div class="stat-details"><h4>Total Revenue</h4><div class="stat-value">$142,500</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../JS/dash.js"></script>
</body>
</html>
